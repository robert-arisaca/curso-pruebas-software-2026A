[pytest]
# Configuración de pytest para el proyecto IMC Calculator

# Directorio de pruebas
testpaths = tests

# Opciones de salida
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizados
markers =
    unit: pruebas unitarias
    bdd: pruebas de BDD
    validation: pruebas de validación

# BDD configuration
bdd_features_base_dir = features

# Configuración de coverage
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    setup.py
    conftest.py
    features/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
